name: Android Only Build

on:
  workflow_dispatch:

env:
  SCITER_RUST_VERSION: "1.75"
  RUST_VERSION: "1.75"
  CARGO_NDK_VERSION: "3.1.2"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  VERSION: "1.4.5"
  NDK_VERSION: "r27c"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  UPLOAD_ARTIFACT: "true"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-android:
    needs: [generate-bridge]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - { arch: arm64, target: aarch64-linux-android }
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake curl gcc-multilib git g++ g++-multilib libasound2-dev libpam0g-dev openjdk-17-jdk-headless pkg-config nasm ninja-build
          
      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        run: |
          ./flutter/build_android_deps.sh arm64-v8a
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.job.target }}

      - name: Build rustdesk lib
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked
          ./flutter/ndk_arm64.sh
          mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
          cp ./target/${{ matrix.job.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so

      - name: Build APK
        shell: bash
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          
          # 1. Change Application ID to avoid ANY signature conflicts with official app
          sed -i 's/applicationId "com.carriez.flutter_hbb"/applicationId "com.carriez.flutter_hbb_dev"/g' ./flutter/android/app/build.gradle
          
          # 2. Fix Kotlin version mismatch (downgrade to stable 1.9.10)
          # The current version 2.1.21 seems too new for the Gradle version, causing metadata issues.
          sed -i 's/id "org.jetbrains.kotlin.android" version "2.1.21" apply false/id "org.jetbrains.kotlin.android" version "1.9.10" apply false/g' ./flutter/android/settings.gradle
          
          # 3. Set memory for Gradle
          sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" ./flutter/android/gradle.properties
          
          # 4. Use debug signing for release build to bypass missing release key error
          # This ensures the APK is signed (with V2/V3) so it can be installed on Fold 5.
          sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/g' ./flutter/android/app/build.gradle
          
          # 5. Copy required native libs
          cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/
          
          # 6. Build the release APK
          pushd flutter
          flutter build apk --release --target-platform android-arm64
          popd
          
          # 7. Bring the APK to the root
          mv ./flutter/build/app/outputs/flutter-apk/app-release.apk ./rustdesk-fixed-android-arm64.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-fixed-android-arm64
          path: rustdesk-fixed-android-arm64.apk
